<!DOCTYPE html>
<html lang="zh">
<head>
	<link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">
	<link rel="stylesheet" href="../styles/main.css">
	<title>text2particle mcfunction | By 6小王游戏9</title>
	<script src="../javascript/jszip.min.js" type="text/javascript"></script>
	<script src="../javascript/FileSaver.js" type="text/javascript"></script>
	<script src="../javascript/Math.uuid.js" type="text/javascript"></script>
	<script>
		manifestBE={format_version:1,header:{description:"url:https://dislink.github.io/img2mcfunction",name:"",uuid:"",min_engine_version:[1,13,0],version:[0,0,1]},modules:[{description:"",type:"data",uuid:"",version:[0,0,1]}]};
		function getMousePos(t,e){return[Math.round(e.clientX-t.getBoundingClientRect().left*t.width/t.getBoundingClientRect().width+1),Math.round(e.clientY-t.getBoundingClientRect().top*t.height/t.getBoundingClientRect().height+1)]}
	</script>
	<style>
		input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
		input[type=number]{-moz-appearance:textfield}
		textarea { width: 100%; min-height: 120px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 12px; font-family: var(--font-mono); resize: vertical; }
		textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
		.preview-container { text-align: center; margin: 20px 0; }
		canvas { max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); margin: 12px auto; display: block; background: #000; }
	</style>
</head>
<body>
	<a href="../" class="back-link">← 返回工具站</a>

	<header class="page-header">
		<h1 class="page-title">✏️ 文本转粒子效果</h1>
		<p class="page-desc">将文字转换为粒子效果命令，支持描边文字、按行切分、叠加样式配置</p>
	</header>

	<div class="page-container">
		<div class="panel">
			<div class="panel-title">转换参数</div>

			<div class="form-row" style="flex-direction: column;">
				<label for="text" style="margin-bottom: 8px;">输入文本</label>
				<textarea id="text" placeholder="在此处输入文本..."></textarea>
			</div>

			<div class="form-row">
				<label>画布 x 轴宽度</label>
				<input type="range" id="sizexScroll" value="256" min="1" max="2048" step="1">
				<input type="number" id="sizex" value="256" min="1" step="1">
				<span>px</span>
			</div>

			<div class="form-row">
				<label>画布 y 轴长度</label>
				<input type="range" id="sizeyScroll" value="256" min="1" max="2048" step="1">
				<input type="number" id="sizey" value="256" min="1" step="1">
				<span>px</span>
			</div>

			<div class="form-row">
				<label for="font">字体</label>
				<input type="text" id="font" value="bold 36px 黑体" style="max-width: 300px;">
			</div>

			<div class="checkbox-grid">
				<div class="checkbox-row">
					<input type="checkbox" id="stroke">
					<label for="stroke">空心文本</label>
				</div>
				<div class="checkbox-row">
					<input type="checkbox" id="sliceByLine">
					<label for="sliceByLine">按行切分</label>
				</div>
				<div class="checkbox-row">
					<input type="checkbox" id="overlay">
					<label for="overlay">叠加文本</label>
				</div>
				<div class="checkbox-row">
					<input type="checkbox" id="no_slice">
					<label for="no_slice">不切分 mcfunction</label>
				</div>
			</div>

			<div class="form-row">
				<label for="lineHeight">单行高度</label>
				<input type="number" id="lineHeight" value="38" min="1" max="32768" step="1">
			</div>
		</div>

		<div class="panel">
			<div class="panel-title">命令参数</div>

			<div class="form-row">
				<label for="particleOffset">坐标偏移量</label>
				<input type="number" id="particleOffset" value="0.1" min="0" step="0.01">
				<span>blocks/px</span>
			</div>

			<div class="form-row">
				<label for="particleID">粒子 ID</label>
				<input type="text" id="particleID" value="minecraft:endrod">
			</div>

			<button id="convert" class="btn btn-primary" style="margin-top: 16px;">🔄 开始转换</button>
		</div>

		<div class="preview-container">
			<h3 style="color: var(--accent); margin-bottom: 12px;">预览</h3>
			<canvas id="preview" width="256" height="256" title="预览"></canvas>
		</div>

		<div style="text-align: center; margin-top: 24px;">
			<button id="download" class="btn btn-download" style="display: none; font-size: 1rem; padding: 16px 40px;">
				<span>⬇️</span> 下载文件
			</button>
		</div>

		<div id="status" class="status-message"></div>
	</div>

	<script>
		var flag=1;
		var filled=false;

		sizexScroll.onchange=e=>{preview.width=e.target.value,sizex.value=e.target.value};
		sizex.onchange=e=>{preview.width=e.target.value,sizexScroll.value=e.target.value};
		sizeyScroll.onchange=e=>{preview.height=e.target.value,sizey.value=e.target.value};
		sizey.onchange=e=>{preview.height=e.target.value,sizeyScroll.value=e.target.value};

		overlay.onchange=e=>{e.target.checked?convert.innerText="🔄 叠加预览":convert.innerText="🔄 开始预览"};
		convert.onclick=()=>{flag=1,convert_args.onchange()};

		convert_args.onchange=()=>{
			var e=preview.getContext("2d");
			if(overlay.checked||(preview.height=preview.height),!overlay.checked||flag){
				if(flag=0,e.font=font.value,e.textAlign="left",e.textBaseline="bottom",stroke.checked)
					for(var t in e.strokeStyle="#ff0000",text.value.split("\n"))e.strokeText(text.value.split("\n")[t],0,(parseInt(t)+1)*parseInt(lineHeight.value));
				else
					for(var a in e.fillStyle="#ff0000",text.value.split("\n"))e.fillText(text.value.split("\n")[a],0,(parseInt(a)+1)*parseInt(lineHeight.value));
				filled=true
			}
		};

		download.onclick=()=>{
			if(!filled)return alert("没有什么可下载的");
			var t,e=new JSZip,a=e.folder("functions"),l=(manifestBE.header.name=text.value+" "+font.value+(stroke.checked?"s":""),manifestBE.header.uuid=Math.uuid(),manifestBE.modules[0].uuid=Math.uuid(),e.file("manifest.json",JSON.stringify(manifestBE)),preview.getContext("2d").getImageData(0,0,preview.width,preview.height)),i=[[]];
			for(let t=0;t<preview.height;t++){
				t%parseInt(lineHeight.value)==0&&sliceByLine.checked&&(i[Math.floor(t/parseInt(lineHeight.value))]=[]);
				for(let e=0;e<preview.width;e++)0!=l.data[4*(t*preview.width+e)]&&i[sliceByLine.checked?Math.floor(t/parseInt(lineHeight.value)):0].push(`particle ${particleID.value} ^${((preview.width-e)*parseFloat(particleOffset.value)).toFixed(6)} ^${((preview.height-t)*parseFloat(particleOffset.value)).toFixed(6)} ^`)
			}
			for(t in i){
				if(no_slice.checked){
					a.file(`text${t}.mcfunction`,i[t].join("\n"))
				}else{
					for(let e=0;e<i[t].length/1e4;e++)a.file(`text${t}${e?"-"+e:""}.mcfunction`,i[t].slice(1e4*e,1e4*(e+1)).join("\n"))
				}
			}
			e.generateAsync({type:"blob"}).then(function(e){saveAs(e,`${text.value} ${font.value}${stroke.checked?"s":""}.mcpack`)})
		};

		            text.oninput=()=>{flag=1,convert_args.onchange()};
preview.onmousemove=e=>{
			var t=getMousePos(e.target,e);
			e.target.title=`Pos: ${t[0]},`+t[1]
		};
	</script>
</body>
</html>
