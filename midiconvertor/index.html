	<script>
	function getSoundString(program, percussion=false, defaultSound=["note.harp", "note.bd"]){
		if(!percussion){
			if([105].includes(program)) return 'note.banjo';
			if([32,33,34,35,36,37,38,39].includes(program)) return 'note.bass';
			if([115,116,117,118].includes(program)) return 'note.basedrum'
			if([9].includes(program)) return 'note.bell';
			if([80,81].includes(program)) return 'note.bit';
			if([112].includes(program)) return 'note.cow_bell';
			if([72,73,74,75,76,77,78,79, 41,42,43,44].includes(program)) return 'note.flute';
			if([24,25,26,27,28,29,30,31].includes(program)) return 'note.guitar';
			if([14].includes(program)) return 'note.chime';
			if([8,9,10,11,12,13,15].includes(program)) return 'note.iron_xylophone';
			if([2].includes(program)) return 'note.pling';
			return defaultSound[0];
		}else{
			if([55].includes(program)) return 'note.cow_bell';
			if([41,43,45].includes(program)) return 'note.hat';
			if([36,37,39].includes(program)) return 'note.snare';
			return defaultSound[1];
		}
	}

<body>
	<a href="../" class="back-link"> 返回工具站</a>

	<header class="page-header">
		<h1 class="page-title"> MIDI 转换器</h1>
		<p class="page-desc">将 MIDI 音乐文件转换为 Minecraft 命令方块结构，支持多种输出格式</p>
	</header>

	<div class="page-container">
		<div class="panel">
			<div class="panel-title">文件上传</div>
			<div style="margin-bottom: 16px;">
				<label for="upload" class="file-upload-label">
					<span class="icon"></span> 上传 MIDI 文件
				</label>
				<input type="file" id="upload" multiple accept="audio/midi">
			</div>
		</div>

		<fieldset id="mid_info" class="panel" style="display: none;">
			<div class="panel-title">MIDI 信息</div>
			<div class="info-box">
				<h3 id="fileName"></h3>
				<p id="timeTotal"></p>
				<p id="tracksCount"></p>
				<p id="noteOnCount"></p>
			</div>
		</fieldset>

		<div class="panel">
			<div class="panel-title">转换参数</div>

			<div class="form-row">
				<label for="speedScroll">速度百分比</label>
				<input type="range" id="speedScroll" min="1" max="400" value="100" step="0.1">
				<input type="number" id="speed" step="0.1" value="100">
				<span style="color: var(--text-muted);">%</span>
			</div>

			<div class="form-row">
				<label for="volume4MainScroll">主音轨音量</label>
				<input type="range" id="volume4MainScroll" min="0" max="1" value="1" step="0.01">
				<input type="number" id="volume4Main" step="0.01" value="1">
			</div>

			<div class="form-row">
				<label for="volume4SubScroll">副音轨音量</label>
				<input type="range" id="volume4SubScroll" min="0" max="1" value="1" step="0.01">
				<input type="number" id="volume4Sub" step="0.01" value="1">
			</div>

			<div class="form-row">
				<label for="defaultMelodic">声学默认音色</label>
				<input type="text" id="defaultMelodic" value="note.harp">
			</div>

			<div class="form-row">
				<label for="defaultPercussion">打击乐默认音色</label>
				<input type="text" id="defaultPercussion" value="note.bd">
			</div>

			<div class="form-row">
				<label for="pitchOffset">音调偏移</label>
				<input type="number" id="pitchOffset" value="0">
			</div>

			<div class="form-row" style="align-items: center;">
				<div class="checkbox-row">
					<input type="checkbox" id="ignorePercussionInstrument">
					<label for="ignorePercussionInstrument">忽略打击乐器</label>
				</div>
			</div>

			<div class="form-row" style="align-items: center;">
				<div class="checkbox-row">
					<input type="checkbox" id="convertToDefault">
					<label for="convertToDefault">全部使用默认音色</label>
				</div>
			</div>

			<div class="form-row" style="align-items: center;">
				<div class="checkbox-row">
					<input type="checkbox" id="hideDebugMsg" checked>
					<label for="hideDebugMsg">隐藏 DEBUG 消息</label>
				</div>
			</div>

			<div class="form-row">
				<label for="timeAlignMode">时轴对齐方式</label>
				<select id="timeAlignMode">
					<option value="relative" selected>相对时差</option>
					<option value="absolute">绝对时长</option>
				</select>
			</div>

			<div class="form-row">
				<label for="convertResult">生成结果</label>
				<select id="convertResult">
					<option value="bdx">BDX</option>
					<option value="mcpack">mcpack</option>
					<option value="mcstructure" selected>mcstructure</option>
				</select>
			</div>

			<label for="convertTracks" style="display:none;">转换音轨</label>
			<select id="convertTracks" multiple style="display:none;"></select>

			<table id="convertSounds" border="1"></table>
		</div>

		<div class="panel">
			<div class="panel-title">结构、命令参数</div>

			<div class="form-row">
				<label for="xLengthScroll">x轴延伸长度</label>
				<input type="range" id="xLengthScroll" min="1" max="256" value="8">
				<input type="number" id="xLength" step="1" value="8">
				<span style="color: var(--text-muted);">block(s)</span>
			</div>

			<div class="form-row">
				<label for="zLengthScroll">z轴延伸长度</label>
				<input type="range" id="zLengthScroll" min="1" max="256" value="8">
				<input type="number" id="zLength" step="1" value="8">
				<span style="color: var(--text-muted);">block(s)</span>
			</div>

			<div id="heightEstimate" class="info-box" style="margin-top: 16px;"></div>

			<div class="form-row">
				<label for="playerSelector">玩家选择器</label>
				<input type="text" id="playerSelector" value="@a">
			</div>

			<div class="form-row">
				<label for="commandVersion">命令版本</label>
				<select id="commandVersion">
					<option value="formal">旧 execute 语法规范</option>
					<option value="new" selected>新 execute 语法规范</option>
				</select>
			</div>
		</div>

		<div style="text-align: center; margin-top: 24px;">
			<button id="download" class="btn btn-download" style="display: none; font-size: 1rem; padding: 16px 40px;">
				<span></span> 下载文件
			</button>
		</div>

		<div id="status" class="status-message"></div>
	</div>

</body>
</html>
