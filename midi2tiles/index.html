<!DOCTYPE html>
<html lang="zh">
<head>
	<link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">
	<link rel="stylesheet" href="../styles/main.css">
	<title>MIDI转tiles-mcfunction | By 6小王游戏9</title>
	<script src="../javascript/MIDIFile.js" type="text/javascript"></script>
	<script src="../javascript/jszip.min.js" type="text/javascript"></script>
	<script src="../javascript/FileSaver.js" type="text/javascript"></script>
	<script src="../javascript/Math.uuid.js" type="text/javascript"></script>
	<script>
		manifestBE={format_version:1,header:{description:"url:https://dislink.github.io/midi2tiles",name:"",uuid:"",min_engine_version:[1,13,0],version:[0,0,1]},modules:[{description:"",type:"data",uuid:"",version:[0,0,1]}]};
		function formatSeconds(value) {
			return `${Math.floor(value / 3600) < 10 ? '0' + Math.floor(value / 3600) : Math.floor(value / 3600)}:${Math.floor((value / 60 % 60)) < 10 ? '0' + Math.floor((value / 60 % 60)) : Math.floor((value / 60 % 60))}:${Math.round((value % 60)) < 10 ? '0' + Math.round((value % 60)) : Math.round((value % 60))}`
		}
	</script>
</head>
<body>
	<a href="../" class="back-link">← 返回工具站</a>

	<header class="page-header">
		<h1 class="page-title">🧱 MIDI → 砖块音符</h1>
		<p class="page-desc">将 MIDI 转换为音符盒播放序列，用游戏内的音符盒演奏音乐</p>
	</header>

	<div class="page-container">
		<div class="panel">
			<div class="panel-title">文件上传</div>
			<div style="text-align: center; margin-bottom: 16px;">
				<label for="upload" class="file-upload-label">
					<span class="icon">📂</span> 上传 MIDI 文件
				</label>
				<input type="file" id="upload" accept="audio/midi">
			</div>
		</div>

		<fieldset id="mid_info" class="panel" style="display: none;">
			<div class="panel-title">MIDI 信息</div>
			<div class="info-box">
				<h3 id="fileName"></h3>
				<p id="timeTotal"></p>
				<p id="noteOnCount"></p>
			</div>
		</fieldset>

		<div class="panel">
			<div class="panel-title">转换参数</div>

			<div class="form-row">
				<label>速度百分比</label>
				<input type="range" id="speedScroll" min="1" max="400" value="100" step="0.1">
				<input type="number" id="speed" step="0.1" value="100">
				<span>%</span>
			</div>

			<div class="form-row">
				<label for="noteInstrument">音符盒音色</label>
				<input type="text" id="noteInstrument" value="block.note_block.harp">
			</div>

			<div class="form-row">
				<label for="pitchOffset">音调偏移</label>
				<input type="number" id="pitchOffset" value="0">
			</div>

			<div class="checkbox-grid">
				<div class="checkbox-row">
					<input type="checkbox" id="hideDebugMsg" checked>
					<label for="hideDebugMsg">隐藏 DEBUG 消息</label>
				</div>
			</div>
		</div>

		<div class="panel">
			<div class="panel-title">音符盒参数</div>

			<div class="form-row">
				<label>x 轴延伸长度</label>
				<input type="range" id="xLengthScroll" min="1" max="256" value="24">
				<input type="number" id="xLength" step="1" value="24">
				<span>block(s)</span>
			</div>

			<div class="form-row">
				<label>z 轴延伸长度</label>
				<input type="range" id="zLengthScroll" min="1" max="256" value="24">
				<input type="number" id="zLength" step="1" value="24">
				<span>block(s)</span>
			</div>

			<div id="heightEstimate" class="info-box" style="margin-top: 16px;"></div>

			<div class="form-row">
				<label for="commandVersion">命令版本</label>
				<select id="commandVersion">
					<option value="formal">旧规范</option>
					<option value="new" selected>新规范</option>
				</select>
			</div>

			<div class="form-row">
				<label for="convertResult">生成结果</label>
				<select id="convertResult">
					<option value="mcpack" selected>mcpack</option>
					<option value="bdx">BDX</option>
				</select>
			</div>
		</div>

		<div style="text-align: center; margin-top: 24px;">
			<button id="download" class="btn btn-download" style="display: none; font-size: 1rem; padding: 16px 40px;">
				<span>⬇️</span> 下载文件
			</button>
		</div>

		<div id="status" class="status-message"></div>
	</div>

	<script>
		speedScroll.onchange=(e)=>{speed.value=e.target.value};
		speed.onchange=(e)=>{speedScroll.value=e.target.value};
		xLengthScroll.onchange=(e)=>{xLength.value=e.target.value;heightEstimate.innerText=commandBlockLength?`预计高度：${Math.ceil(commandBlockLength/(parseInt(xLength.value)*parseInt(zLength.value)))}`:''};
		xLength.onchange=(e)=>{xLengthScroll.value=e.target.value;heightEstimate.innerText=commandBlockLength?`预计高度：${Math.ceil(commandBlockLength/(parseInt(xLength.value)*parseInt(zLength.value)))}`:''};
		zLengthScroll.onchange=(e)=>{zLength.value=e.target.value;heightEstimate.innerText=commandBlockLength?`预计高度：${Math.ceil(commandBlockLength/(parseInt(xLength.value)*parseInt(zLength.value)))}`:''};
		zLength.onchange=(e)=>{zLengthScroll.value=e.target.value;heightEstimate.innerText=commandBlockLength?`预计高度：${Math.ceil(commandBlockLength/(parseInt(xLength.value)*parseInt(zLength.value)))}`:''};
		upload.onchange=()=>{
			if(!upload.files[0]) return;
			var fr=new FileReader();
			fr.onload=()=>{
				try{
					midiFile=new MIDIFile(fr.result);
					for(let i in midiFile.getEvents()){midiFile.timeTotal=(midiFile.timeTotal>midiFile.getEvents()[i].slice(-1)[0].playTime?midiFile.timeTotal:midiFile.getEvents()[i].slice(-1)[0].playTime)}
					document.getElementById("fileName").innerText=upload.files[0].name;
					document.getElementById("timeTotal").innerText="时长："+formatSeconds(Math.round(midiFile.timeTotal/1000));
					document.getElementById("noteOnCount").innerText="音符数："+midiFile.getEvents([MIDIEvents.EVENT_MIDI],[MIDIEvents.EVENT_MIDI_NOTE_ON], [], true)[0].filter((d)=>{return d.param2}).length;
					document.getElementById("mid_info").style="display: block;";
					document.getElementById("download").style="display: inline-flex;";
					commandBlockLength=midiFile.getEvents([MIDIEvents.EVENT_MIDI],[MIDIEvents.EVENT_MIDI_NOTE_ON], [], true)[0].filter((d)=>{return d.param2}).length;
					heightEstimate.innerText=commandBlockLength?`预计高度：${Math.ceil(commandBlockLength/(parseInt(xLength.value)*parseInt(zLength.value)))}`:'';
				}catch(e){
					document.getElementById("status").innerText=e.toString().split('\n')[0];
					document.getElementById("status").className="status-message error";
					alert(e.toString().split('\n')[0]+",可能是midi文件损坏");
				}
			};
			fr.readAsArrayBuffer(upload.files[0]);
		};
		download.onclick=(()=>{
			let commandBlocks=[];
			let seq=0,tickAccu=0;
			try{
				let notes=midiFile.getEvents([MIDIEvents.EVENT_MIDI],[MIDIEvents.EVENT_MIDI_NOTE_ON], [], true)[0].sort((a,b)=>{return a.playTime>b.playTime});
				for(let i in notes){
					if(!notes[i].param2) continue;
					let tickDelay=Math.round((notes[i].playTime-notes[seq].playTime)/(50*(parseFloat(speed.value)/100)));
					let noteName=noteInstrument.value.split(" ").pop().replace("note_block.","");
					commandBlocks.push({type:"setblock",pos:[Math.floor(seq/(parseInt(xLength.value)*parseInt(zLength.value)))%parseInt(xLength.value),Math.floor(seq/(parseInt(xLength.value)*parseInt(zLength.value))/parseInt(xLength.value)),seq%parseInt(zLength.value)],command:`setblock ~${Math.floor(seq/(parseInt(xLength.value)*parseInt(zLength.value)))%parseInt(xLength.value)} ~${Math.floor(seq/(parseInt(xLength.value)*parseInt(zLength.value))/parseInt(xLength.value))} ~${seq%parseInt(zLength.value)} ${noteInstrument.value}[note=${Math.max(0,Math.min(24,notes[i].param1+parseInt(pitchOffset.value)))}]`});
					if(!document.getElementById("hideDebugMsg").checked) commandBlocks[commandBlocks.length-1].command+=` ||| Note: ${Math.max(0,Math.min(24,notes[i].param1+parseInt(pitchOffset.value)))}, Time: ${formatSeconds(notes[i].playTime/1000)}`;
					commandBlocks.push({type:"playsound",pos:[0,0,0],command:`playsound minecraft:music.${noteName} @a[scores={${upload.files[0].name}=${Math.round((notes[i].playTime)/(50*(parseFloat(speed.value)/100)))}..}] ~~~\n`});
					seq++;
				}
			}catch(e){alert(e);console.error(e);commandBlocks=[];}
			if(convertResult.value=='mcpack'){
				zip=new JSZip();
				functions=zip.folder("functions");
				manifestBE.header.name=upload.files[0].name;
				manifestBE.header.uuid=Math.uuid();
				manifestBE.modules[0].uuid=Math.uuid();
				zip.file("manifest.json", JSON.stringify(manifestBE));
				let content='';
				for(let i in commandBlocks){
					if(commandBlocks[i].type=="setblock"){
						content+=commandBlocks[i].command+"\n";
					}else{
						content+=commandBlocks[i].command;
					}
				}
				functions.file("main.mcfunction", content);
				zip.generateAsync({type:"blob"}).then(function(content) {
					saveAs(content, `${upload.files[0].name}.mcpack`);
				});
			}else{
				saveAs(new Blob([JSON.stringify(commandBlocks)]),`${upload.files[0].name}.json`);
			}
		});
	</script>
</body>
</html>
