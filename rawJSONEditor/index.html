	<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
	<link rel="stylesheet" href="/styles/main.css">
    <title>原始JSON文本编辑器 | By 6小王游戏9</title>
    <style>
        body { font-family: var(--font-mono); }
        .object-container { border-left: 2px solid var(--border-light); margin-left: 20px; padding-left: 12px; margin-top: 4px; }
        .object-key { margin-right: 10px; font-weight: 600; cursor: pointer; color: var(--accent-alt); }
        .object-value { margin-left: 20px; }
        .collapsed .object-value { display: none; }
        .collapsed::after { content: '...'; color: var(--text-dim); margin-left: 5px; }
        .editable { display: inline-block; border: 1px solid var(--border); padding: 2px 8px; margin-right: 20px; border-radius: 4px; outline: none; min-width: 80px; max-width: 400px; resize: none; background: var(--bg-input); color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; }
        .add-button { margin-right: 10px; color: var(--accent); cursor: pointer; font-weight: 600; }
        .delete-button { margin-right: 10px; color: var(--danger); cursor: pointer; font-weight: 600; }
        @font-face { font-family: "Minecraft"; src: url("/fonts/Mojangles.ttf"); }
        @font-face { font-family: "Unifont"; src: url("/fonts/unifont-15.1.04.otf"); }
        .display { display: block; margin-top: 20px; margin-left: 20px; margin-bottom: 20px; border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-md); outline: none; width: auto; min-height: 50px; resize: vertical; background-color: rgba(24, 24, 24, 0.9); color: white; font-weight: normal; font-style: normal; font-size: 1rem; line-height: 1.6; }
        .text { white-space: pre-wrap; }
        .random { color: #00000020 }
        .editor-section { margin-bottom: 24px; }
        .section-title { font-family: var(--font-mono); font-size: 0.9rem; color: var(--accent); font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>
	<a href="/" class="back-link">← 返回工具站</a>

	<header class="page-header">
		<h1 class="page-title">📝 rawJSON 编辑器</h1>
		<p class="page-desc">可视化编辑 Minecraft raw JSON 文本，支持 § 颜色代码实时预览</p>
	</header>

	<div class="page-container">
        <div class="panel editor-section">
            <div class="panel-title">rawtext</div>
            <div id="rawtext"></div>
        </div>

        <div class="panel editor-section">
            <div class="panel-title">extra</div>
            <div id="extra"></div>
        </div>

        <div class="panel editor-section">
            <div class="panel-title">display 预览</div>
            <p class="display" id="evaluateDisplay" title="点击刷新预览"></p>
        </div>

        <div class="info-box">
            <p style="color: var(--text-dim); font-size: 0.85rem;">💡 提示：随机文本以淡色透明表示，可选中查看原文。双击对象可折叠/展开。</p>
        </div>
    </div>

    <script>
        function evaluate(rawJSON, scores={}, selectors={}) {
            var rawtext=[];
            if(rawJSON.translate){
                var translate=rawJSON.translate.replaceAll(/%(.)/g,"$1");
                var index=0;
                var replacer;
                if(Array.isArray(rawJSON.with)){
                    replacer=rawJSON.with.filter(function(item){return typeof item=="string"});
                }else if(typeof rawJSON.with=="object"){
                    replacer=evaluate(rawJSON.with, scores, selectors);
                }
                if(!replacer?.length){replacer=undefined;}
                while(/%[sd0-9]/.test(translate)&&replacer){
                    while(/%[sd]/.test(translate)&&replacer){
                        translate=translate.replace(/%[sd]/,replacer[index]===undefined?"":replacer[index])
                        index++;
                    };
                    while(/%[0-9]/.test(translate)&&replacer){
                        var tindex=translate.match(/%([0-9])/)[1]-1;
                        translate=translate.replace(/%([0-9])/,replacer[tindex+index]===undefined?"":replacer[tindex+index])
                    }}
                rawtext.push(translate);
            }
            if(rawJSON.text&&!rawJSON.translate){rawtext.push(rawJSON.text);}
            if(rawJSON.selector&&!rawJSON.translate&&!rawJSON.text){
                if(selectors[rawJSON.selector]!==undefined) rawtext.push(selectors[rawJSON.selector]);
            }
            if(rawJSON.score&&!rawJSON.translate&&!rawJSON.text&&!rawJSON.selector){
                if(scores[rawJSON.score.objective]?.[rawJSON.score.name]!==undefined) rawtext.push(scores[rawJSON.score.objective]?.[rawJSON.score.name]);
            }
            if(rawJSON.rawtext){
                for(var i=0;i<rawJSON.rawtext.length;i++){
                    rawtext.push(...evaluate(rawJSON.rawtext[i], scores, selectors));
                }
            }
            return rawtext;
        }
    </script>
    <script>
        collapseState = {};
        function renderObject(obj, container, level = 0, basePath = '') {
            container.innerHTML = '';
            if(container==rawtextContainer){
                const editButton = document.createElement('span');
                editButton.classList.add('add-button');
                editButton.textContent = '✏️ edit';
                editButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const newValue = prompt('输入新的属性值:', JSON.stringify(obj));
                    if(newValue===null) return;
                    try{data = obj = JSON.parse(newValue);}catch(e){window.alert(`JSON.parse error: ${e}`);}
                    renderObject(obj, container, level, basePath);
                });
                const copyButton = document.createElement('span');
                copyButton.classList.add('add-button');
                copyButton.textContent = '📋 copy';
                copyButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    navigator.clipboard.writeText(JSON.stringify(obj));
                });
                container.appendChild(editButton);
                container.appendChild(copyButton);
            }
            for (let key in obj) {
                if (typeof obj[key] === 'object') {
                    const objectContainer = document.createElement('div');
                    objectContainer.classList.add('object-container');
                    objectContainer.level = level;
                    if(collapseState?.[basePath + key]){objectContainer.classList.add('collapsed');}
                    objectContainer.addEventListener('dblclick', (event) => {
                        event.stopPropagation();
                        if(event.target.contentEditable!='true'){
                            objectContainer.classList.toggle('collapsed');
                            collapseState[basePath + key] = objectContainer.classList.contains('collapsed');
                        }
                    });
                    const bgColors=['rgba(57, 211, 83, 0.05)','rgba(88, 166, 255, 0.05)','rgba(210, 153, 34, 0.05)','rgba(248, 81, 73, 0.05)'];
                    objectContainer.style.backgroundColor = bgColors[level % 4];
                    const objectKeyContainer = document.createElement('div');
                    objectKeyContainer.classList.add('object-key-container');
                    const objectKey = document.createElement('span');
                    objectKey.classList.add('object-key');
                    objectKey.textContent = key;
                    objectKey.contentEditable = true;
                    objectKey.addEventListener('input', (event) => {
                        const newKey = event.target.textContent;
                        const value = obj[key];
                        if(Array.isArray(obj)){obj.splice(key, 1);}else{delete obj[key];}
                        obj[newKey] = value;
                    });
                    const deleteButton = document.createElement('span');
                    deleteButton.classList.add('delete-button');
                    deleteButton.textContent = '✕';
                    deleteButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        if(Array.isArray(obj)){obj.splice(key, 1);}else{delete obj[key];}
                        renderObject(obj, container, level, basePath);
                    });
                    const editButton = document.createElement('span');
                    editButton.classList.add('add-button');
                    editButton.textContent = '✏️';
                    editButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        const newValue = prompt('输入新的属性值:', JSON.stringify(obj[key]));
                        if(newValue===null) return;
                        try{obj[key] = JSON.parse(newValue);renderObject(obj, container, level, basePath);}catch(e){window.alert(`${e}`);}
                    });
                    const copyButton = document.createElement('span');
                    copyButton.classList.add('add-button');
                    copyButton.textContent = '📋';
                    copyButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        navigator.clipboard.writeText(JSON.stringify(obj[key]));
                    });
                    objectKeyContainer.appendChild(objectKey);
                    objectKeyContainer.appendChild(deleteButton);
                    objectKeyContainer.appendChild(editButton);
                    objectKeyContainer.appendChild(copyButton);
                    const objectValue = document.createElement('div');
                    objectValue.classList.add('object-value');
                    renderObject(obj[key], objectValue, level + 1, basePath + key + '.');
                    objectContainer.appendChild(objectKeyContainer);
                    objectContainer.appendChild(objectValue);
                    container.appendChild(objectContainer);
                } else {
                    const keyValue = document.createElement('div');
                    keyValue.innerHTML = `<span class="object-key" contenteditable>${key}</span>: <span class="object-value editable" contenteditable>${obj[key]}</span> <span class="delete-button">✕</span>`;
                    keyValue.querySelector('.object-key').addEventListener('input', (event) => {
                        const newKey = event.target.textContent;
                        const value = obj[key];
                        if(Array.isArray(obj)){obj.splice(key, 1);}else{delete obj[key];}
                        obj[newKey] = value;
                    });
                    keyValue.querySelector('.object-value').addEventListener('input', (event) => {obj[key] = event.target.textContent;});
                    keyValue.querySelector('.delete-button').addEventListener('click', (event) => {
                        if(Array.isArray(obj)){obj.splice(key, 1);}else{delete obj[key];}
                        event.stopPropagation();
                        renderObject(obj, container, level, basePath);
                    });
                    container.appendChild(keyValue);
                }
            }
            if(Array.isArray(obj)){
                const templateButton = document.createElement('span');
                templateButton.classList.add('add-button');
                templateButton.textContent = '📝 模板';
                templateButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const dialogue = document.createElement('dialog');
                    dialogue.classList.add('dialogue');
                    dialogue.innerHTML = `
                    <form method="dialog">
                        <p><label>选择模板: <select>
                            <option>text</option><option>rawtext</option>
                            <option>translate...with[...]</option><option>translate...with{rawtext}</option>
                            <option>score</option><option>selector</option><option>basic string</option>
                        </select></label></p>
                        <div><button value="cancel">取消</button><button id="confirmBtn" value="text">确定</button></div>
                    </form>`;
                    dialogue.querySelector('select').addEventListener('change', () => {dialogue.returnValue = dialogue.querySelector('select').value;});
                    dialogue.querySelector('#confirmBtn').addEventListener('click', () => {dialogue.close(dialogue.returnValue);});
                    dialogue.addEventListener('close', () => {
                        if (dialogue.returnValue !== 'cancel') {
                            if(dialogue.returnValue === 'rawtext'){obj.push({"rawtext":[]});}
                            else if(dialogue.returnValue === 'translate...with[...]'){obj.push({"translate":"","with":[]});}
                            else if(dialogue.returnValue === 'translate...with{rawtext}'){obj.push({"translate":"","with":{"rawtext":[]}});}
                            else if(dialogue.returnValue === 'score'){obj.push({"score":{"name":"","objective":""}});}
                            else if(dialogue.returnValue === 'selector'){obj.push({"selector":""});}
                            else if(dialogue.returnValue === 'basic string'){obj.push("");}
                            else{obj.push({"text":""});}
                            renderObject(obj, container, level, basePath);
                        }
                        dialogue.remove();
                    });
                    document.body.appendChild(dialogue);
                    dialogue.showModal();
                });
                container.insertBefore(templateButton, container.firstChild);
            }
            const addButton = document.createElement('span');
            addButton.classList.add('add-button');
            addButton.textContent = '+';
            addButton.addEventListener('click', (event) => {
                event.stopPropagation();
                const newKey = prompt('输入新的属性键:');
                if(newKey===null) return;
                const newValue = prompt('输入新的属性值:');
                if(newValue===null) return;
                try{obj[newKey] = JSON.parse(newValue);}catch(e){obj[newKey] = newValue;}
                renderObject(obj, container, (container.level||-1)+1, basePath);
            });
            container.insertBefore(addButton, container.firstChild);
        }
        data={"rawtext":[]};
        extra={"scores":{},"selectors":{}};
        const extraContainer = document.getElementById('extra');
        const rawtextContainer = document.getElementById('rawtext');
        const evaluateDisplay = document.getElementById('evaluateDisplay');
        evaluateDisplay.addEventListener('click', () => {
            var text=evaluate(data, extra.scores, extra.selectors).join('');
            if(/[\u1000-\uffff]/.test(text)){evaluateDisplay.style.fontFamily="unifont";}else{evaluateDisplay.style.fontFamily="Minecraft";}
            text=text.replace(/§[^0-9a-u]/g,'');
            var sectionCount=(/§[0-9a-u]/g.exec(text)?.length||0)+1;
            evaluateDisplay.innerHTML = "<span class=\"text\">"+
                text.replaceAll("§0","<span style=\"color: #000000\">")
                .replaceAll("§1","<span style=\"color: #0000aa\">")
                .replaceAll("§2","<span style=\"color: #00aa00\">")
                .replaceAll("§3","<span style=\"color: #00aaaa\">")
                .replaceAll("§4","<span style=\"color: #aa0000\">")
                .replaceAll("§5","<span style=\"color: #aa00aa\">")
                .replaceAll("§6","<span style=\"color: #ffaa00\">")
                .replaceAll("§7","<span style=\"color: #aaaaaa\">")
                .replaceAll("§8","<span style=\"color: #555555\">")
                .replaceAll("§9","<span style=\"color: #5555ff\">")
                .replaceAll("§a","<span style=\"color: #55ff55\">")
                .replaceAll("§b","<span style=\"color: #55ffff\">")
                .replaceAll("§c","<span style=\"color: #ff5555\">")
                .replaceAll("§d","<span style=\"color: #ff55ff\">")
                .replaceAll("§e","<span style=\"color: #ffff55\">")
                .replaceAll("§f","<span style=\"color: #ffffff\">")
                .replaceAll("§g","<span style=\"color: #ddd605\">")
                .replaceAll("§h","<span style=\"color: #e3d4d1\">")
                .replaceAll("§i","<span style=\"color: #cecaca\">")
                .replaceAll("§j","<span style=\"color: #443a3b\">")
                .replaceAll("§k","<span class=\"random\">")
                .replaceAll("§l","<span style=\"font-weight: bold\">")
                .replaceAll("§m","<span style=\"color: #971607\">")
                .replaceAll("§n","<span style=\"color: #b4684d\">")
                .replaceAll("§o","<span style=\"font-style: italic\">")
                .replaceAll("§p","<span style=\"color: #deb12d\">")
                .replaceAll("§q","<span style=\"color: #11a036\">")
                .replaceAll("§r","<span style=\"color: #ffffff;font-weight: normal;font-style: normal\">")
                .replaceAll("§s","<span style=\"color: #2cbaa8\">")
                .replaceAll("§t","<span style=\"color: #21497b\">")
                .replaceAll("§u","<span style=\"color: #9a5cc6\">")
                +"</span>".repeat(sectionCount);
        });
        renderObject(data, rawtextContainer);
        renderObject(extra, extraContainer);
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            window.alert(msg);
            return false;
        }
    </script>
</body>
