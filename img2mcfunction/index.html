<!DOCTYPE html>
<html lang="zh">
<head>
	<link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">
	<link rel="stylesheet" href="../styles/main.css">
	<title>图片转mcfunction | By 6小王游戏9</title>
	<script src="../javascript/palettes.js" type="text/javascript"></script>
	<script src="../javascript/jszip.min.js" type="text/javascript"></script>
	<script src="../javascript/FileSaver.js" type="text/javascript"></script>
	<script src="../javascript/Math.uuid.js" type="text/javascript"></script>
	<script>
		manifestBE={format_version:1,header:{description:"url:https://dislink.github.io/img2mcfunction",name:"",uuid:"",min_engine_version:[1,13,0],version:[0,0,1]},modules:[{description:"",type:"data",uuid:"",version:[0,0,1]}]};
		function getMousePos(t,e){return[Math.round(e.clientX-t.getBoundingClientRect().left*t.width/t.getBoundingClientRect().width+1),Math.round(e.clientY-t.getBoundingClientRect().top*t.height/t.getBoundingClientRect().height+1)]}
		function getBlock(t,e,n,i,a=0,h=1,o=1,B=1,g=1){let R=1/0,u;for(var c in i)(a?Math.abs(i[c].R-t)*h+Math.abs(i[c].G-e)*o+Math.abs(i[c].B-n)*B-(g?(((i[c].R-t)/(t||1)-(i[c].G-e)/(e||1))**2+((i[c].G-e)/(e||1)-(i[c].B-n)/(n||1))**2+((i[c].B-n)/(n||1)-(i[c].R-t)/(t||1))**2)*g:0):(i[c].R-t)**2*h+(i[c].G-e)**2*o+(i[c].B-n)**2*B-(g?(((i[c].R-t)/(t||1)-(i[c].G-e)/(e||1))**2+((i[c].G-e)/(e||1)-(i[c].B-n)/(n||1))**2+((i[c].B-n)/(n||1)-(i[c].R-t)/(t||1))**2)*g:0))<R&&(R=a?Math.abs(i[c].R-t)*h+Math.abs(i[c].G-e)*o+Math.abs(i[c].B-n)*B:(i[c].R-t)**2*h+(i[c].G-e)**2*o+(i[c].B-n)**2*B,u=i[c]);return u}
	</script>
	<style>
		input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
		input[type=number]{-moz-appearance:textfield}
		.img-container { text-align: center; margin: 20px 0; }
		canvas { max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md); margin: 12px auto; display: block; }
		.form-section { margin-bottom: 16px; }
		.form-section label { display: block; margin: 8px 0 4px; font-size: 0.9rem; color: var(--text-muted); }
		.form-section input[type="range"] { width: 100%; }
		.btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
		.checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin: 16px 0; }
		.progress-bar-container { width: 100%; background: var(--bg-input); border-radius: 8px; overflow: hidden; margin: 12px 0; height: 24px; }
		.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 8px; transition: width 0.2s ease; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #fff; font-weight: bold; min-width: 40px; }
	</style>
</head>
<body>
	<a href="../" class="back-link">← 返回工具站</a>

	<header class="page-header">
		<h1 class="page-title">🖼️ 图片转 mcfunction</h1>
		<p class="page-desc">将图片像素数据转换为 Minecraft 命令方块序列，支持 JE/BE 平台色彩映射</p>
	</header>

	<div class="page-container">
		<div class="panel">
			<div class="panel-title">文件上传</div>
			<div style="text-align: center; margin-bottom: 16px;">
				<label for="upload" class="file-upload-label">
					<span class="icon">📂</span> 选择图片文件
				</label>
				<input type="file" id="upload" accept="image/*">
			</div>
		</div>

		<fieldset id="img_info" class="panel" style="display: none;">
			<div class="panel-title">图片信息</div>
			<div class="info-box">
				<h3 id="img_size"></h3>
			</div>
			<div class="img-container">
				<canvas id="img_preview" title="原始图片预览"></canvas>
			</div>
		</fieldset>

		<div class="panel">
			<div class="panel-title">转换参数</div>

			<div class="form-section">
				<label>红色差值权重</label>
				<div class="form-row">
					<input type="range" id="rWeightScroll" value="1" step="0.01" max="10" min="0">
					<input type="number" id="rWeight" value="1" step="0.01">
				</div>
			</div>

			<div class="form-section">
				<label>红色缩放比例</label>
				<div class="form-row">
					<input type="range" id="rScaleScroll" value="100" step="0.1" max="200" min="0">
					<input type="number" id="rScale" value="100" step="0.1">
					<span>%</span>
				</div>
			</div>

			<div class="form-section">
				<label>绿色差值权重</label>
				<div class="form-row">
					<input type="range" id="gWeightScroll" value="1" step="0.01" max="10" min="0">
					<input type="number" id="gWeight" value="1" step="0.01">
				</div>
			</div>

			<div class="form-section">
				<label>绿色缩放比例</label>
				<div class="form-row">
					<input type="range" id="gScaleScroll" value="100" step="0.1" max="200" min="0">
					<input type="number" id="gScale" value="100" step="0.1">
					<span>%</span>
				</div>
			</div>

			<div class="form-section">
				<label>蓝色差值权重</label>
				<div class="form-row">
					<input type="range" id="bWeightScroll" value="1" step="0.01" max="10" min="0">
					<input type="number" id="bWeight" value="1" step="0.01">
				</div>
			</div>

			<div class="form-section">
				<label>蓝色缩放比例</label>
				<div class="form-row">
					<input type="range" id="bScaleScroll" value="100" step="0.1" max="200" min="0">
					<input type="number" id="bScale" value="100" step="0.1">
					<span>%</span>
				</div>
			</div>

			<div class="form-section">
				<label>色差校准权重 (Exp)</label>
				<div class="form-row">
					<input type="range" id="caWeightScroll" value="0" step="0.1" max="10" min="0">
					<input type="number" id="caWeight" value="0" step="0.1">
				</div>
			</div>

			<div class="form-section">
				<label>拟合方式</label>
				<select id="fitMode">
					<option value="stdDev">标准差最小</option>
					<option value="stdSqr">标准平方和最小</option>
				</select>
			</div>

			<div class="checkbox-grid">
				<div class="checkbox-row">
					<input type="checkbox" id="relativePos" checked>
					<label for="relativePos">使用相对坐标 (~)</label>
				</div>
				<div class="checkbox-row">
					<input type="checkbox" id="guideFunction" checked>
					<label for="guideFunction">添加引导 function</label>
				</div>
				<div class="checkbox-row">
					<input type="checkbox" id="guideCommand" checked>
					<label for="guideCommand">function 结尾添加引导命令</label>
				</div>
			</div>

			<div class="form-section">
				<label>命令版本</label>
				<select id="commandPlatform">
					<option value="BE" selected>基岩版</option>
					<option value="JE">JAVA版</option>
				</select>
			</div>
		</div>

		<div class="panel">
			<div class="panel-title">命令参数</div>

			<div class="form-row">
				<label>图片 x 轴 function 分割上限</label>
				<input type="range" id="xRange" value="96" max="98" min="1">
				<span id="xRangeLabel">96</span>
			</div>

			<div class="form-row">
				<label>图片 y 轴 function 分割上限</label>
				<input type="range" id="yRange" value="96" max="98" min="1">
				<span id="yRangeLabel">96</span>
			</div>
		</div>

		<div class="img-container" id="convertPreviewContainer" style="display: none;">
			<h3 style="color: var(--accent); margin-bottom: 12px;">转换预览</h3>
			<canvas id="convert_preview" title="转换预览"></canvas>
		</div>

		<div class="btn-row">
			<button id="convert" class="btn btn-primary" style="display: none;">🔄 开始转换</button>
			<button id="download" class="btn btn-download" style="display: none;">⬇️ 下载文件</button>
		</div>

		<div id="status" class="status-message"></div>
		<div id="progressContainer" class="progress-bar-container" style="display: none;">
			<div id="progressBar" class="progress-bar" style="width: 0%;">0%</div>
		</div>
	</div>

	<script>
		var img=new Image;
		var blocks;
		var fileName;
		var isConverting=false;
		var isDownloading=false;

		function setProgress(pct){
			progressBar.style.width=pct+"%";
			progressBar.innerText=pct+"%";
		}
		function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

		rWeightScroll.onchange=e=>{rWeight.value=e.target.value};
		rWeight.onchange=e=>{rWeightScroll.value=e.target.value};
		rScaleScroll.onchange=e=>{rScale.value=e.target.value};
		rScale.onchange=e=>{rScaleScroll.value=e.target.value};
		gWeightScroll.onchange=e=>{gWeight.value=e.target.value};
		gWeight.onchange=e=>{gWeightScroll.value=e.target.value};
		gScaleScroll.onchange=e=>{gScale.value=e.target.value};
		gScale.onchange=e=>{gScaleScroll.value=e.target.value};
		bWeightScroll.onchange=e=>{bWeight.value=e.target.value};
		bWeight.onchange=e=>{bWeightScroll.value=e.target.value};
		bScaleScroll.onchange=e=>{bScale.value=e.target.value};
		bScale.onchange=e=>{bScaleScroll.value=e.target.value};
		caWeightScroll.onchange=e=>{caWeight.value=e.target.value};
		caWeight.onchange=e=>{caWeightScroll.value=e.target.value};

		xRange.onchange=e=>{
			e.target.labels[0].textContent="图片x轴function分割上限 "+e.target.value;
			yRange.max=Math.floor((1e4-(guideCommand?2:0))/e.target.value)
		};
		yRange.onchange=e=>{
			e.target.labels[0].textContent="图片y轴function分割上限 "+e.target.value;
			xRange.max=Math.floor((1e4-(guideCommand?2:0))/e.target.value)
		};

		upload.onchange=()=>{
			var e;
			upload.files[0]&&((e=new FileReader).onload=()=>{
				img.src=e.result;
				convert.style="display: inline-flex;";
				status.innerText='文件已改变，请点击"转换"按钮以应用改变'
			},e.readAsDataURL(upload.files[0]))
		};

		img.onload=()=>{
			download.style="display: none;";
			img_preview.width=img.width;
			img_preview.height=img.height;
			img_preview.style="display: block;";
			img_size.innerText=`宽：${img.width}    高：`+img.height;
			img_info.style="display: block;";
			img_preview.getContext("2d").drawImage(img,0,0,img.width,img.height)
		};

		convert.onclick=()=>{
			if(isConverting||isDownloading)return;
			upload.files[0]?(status.innerText="正在转换...",imgConvertAsync()):status.innerText="请上传图片文件"
		};

		download.onclick=()=>{
			if(isConverting||isDownloading)return;
			if(!blocks)return alert("没有什么可下载的");
			downloadAsync();
		};

		async function downloadAsync(){
			isDownloading=true;
			download.disabled=true;
			download.style.opacity="0.5";
			convert.disabled=true;
			convert.style.opacity="0.5";
			progressContainer.style="display: block;";
			status.innerText="正在准备文件...";
			setProgress(0);

			var xR=parseFloat(xRange.value);
			var yR=parseFloat(yRange.value);
			var isJE="JE"==commandPlatform.value;
			var useRel=relativePos.checked;
			var useGuide=guideFunction.checked;
			var useGuideCmd=guideCommand.checked;

			var l=[],i={};
			for(let a=0;a<img_preview.height;a+=yR)
				for(let e=0;e<img_preview.width;e+=xR){
					let key=Math.floor(e/xR)+","+Math.floor(a/yR);
					i[key]=[];
					l.push(key);
				}

			var chunkSize=50000;
			for(let start=0;start<blocks.length;start+=chunkSize){
				let end=Math.min(start+chunkSize,blocks.length);
				for(let e=start;e<end;e++){
					let key=Math.floor(blocks[e][0]/xR)+","+Math.floor(blocks[e][1]/yR);
					i[key].push([blocks[e][0]%xR,blocks[e][1]%yR,blocks[e][3]]);
				}
				setProgress(Math.round(end/blocks.length*40));
				await sleep(0);
			}

			var zip,functions;
			if(!isJE){
				zip=new JSZip;
				functions=zip.folder("functions");
			}

			if(useGuide){
				let helpContent=`say 图片信息：宽：${img.width}  高：${img.height}    图像命令总长度：${img.width*img.height}    function文件数：${l.length}\nsay 输入/function "${l[0].replace(",","-")}"以启动`;
				if(isJE){
					saveAs(new Blob([helpContent],{type:"text/plainText"}),"help.mcfunction");
				}else{
					functions.file("help.mcfunction",helpContent);
				}
			}

			for(let o=0;o<l.length;o++){
				let a=l[o];
				let t="";
				let parts=a.split(",");
				let baseX=parseFloat(parts[0]);
				let baseY=parseFloat(parts[1]);
				for(let e in i[a]){
					let bx=i[a][e][0];
					let by=i[a][e][1];
					let bname=i[a][e][2];
					if(useRel){
						t+=`setblock ~${Math.round(bx-xR/2)} ~ ~${Math.round(by-yR/2)} ${bname}\n`;
					}else{
						t+=`setblock ${Math.round(baseX*xR+bx)} ~ ${Math.round(baseY*yR+by)} ${bname}\n`;
					}
				}
				if(useGuideCmd){
					if(l[o+1]){
						let np=l[o+1].split(",");
						if(useRel){
							t+=`tp @s ~${Math.round((parseFloat(np[0])-baseX)*xR)} ~ ~${Math.round((parseFloat(np[1])-baseY)*yR)}\n`;
						}else{
							t+=`tp @s ${Math.round(parseFloat(np[0])*xR)} ~ ${Math.round(parseFloat(np[1])*yR)}\n`;
						}
						t+=`say 已传送至下一执行位点,请勿自行移动！请等待区块加载完成后输入/function "${l[o+1].replace(",","-")}"继续生成`;
					}else{
						t+="say 生成完成！";
					}
				}
				if(isJE){
					saveAs(new Blob([t],{type:"text/plainText"}),a.replace(",","-")+".mcfunction");
				}else{
					functions.file(a.replace(",","-")+".mcfunction",t);
				}
				setProgress(40+Math.round((o+1)/l.length*50));
				if(isJE){
					await sleep(500);
				}else if(o%10===0){
					await sleep(0);
				}
			}

			if(!isJE){
				status.innerText="正在打包 mcpack...";
				setProgress(92);
				manifestBE.header.name=fileName;
				manifestBE.header.uuid=Math.uuid();
				manifestBE.modules[0].uuid=Math.uuid();
				zip.file("manifest.json",JSON.stringify(manifestBE));
				let blob=await zip.generateAsync({type:"blob"});
				setProgress(100);
				saveAs(blob,fileName+".mcpack");
			}

			status.innerText="下载完成！";
			status.className="status-message success";
			progressContainer.style="display: none;";
			isDownloading=false;
			download.disabled=false;
			download.style.opacity="1";
			convert.disabled=false;
			convert.style.opacity="1";
		}

		imgConvertAsync=()=>{
			isConverting=true;
			convert.disabled=true;
			convert.style.opacity="0.5";
			convert.style.cursor="not-allowed";
			download.style="display: none;";
			progressContainer.style="display: block;";
			setProgress(0);

			convert_preview.width=img_preview.width;
			convert_preview.height=img_preview.height;
			fileName=upload.files[0].name;
			blocks=[];
			var imageData=img_preview.getContext("2d").getImageData(0,0,img_preview.width,img_preview.height);
			var w=img_preview.width;
			var h=img_preview.height;
			var totalRows=h;
			var currentRow=0;
			var rowsPerChunk=Math.max(1,Math.min(50,Math.floor(50000/w)));
			var palette="BE"==commandPlatform.value?paletteBE:paletteJE;
			var useSqr="stdSqr"==fitMode.value;
			var rW=parseFloat(rWeight.value);
			var gW=parseFloat(gWeight.value);
			var bW=parseFloat(bWeight.value);
			var caW=parseFloat(caWeight.value);
			var rS=parseFloat(rScale.value)/100;
			var gS=parseFloat(gScale.value)/100;
			var bS=parseFloat(bScale.value)/100;

			function processChunk(){
				var endRow=Math.min(currentRow+rowsPerChunk,totalRows);
				for(var a=currentRow;a<endRow;a++){
					for(var e=0;e<w;e++){
						var idx=4*(a*w+e);
						var t=getBlock(imageData.data[idx]*rS,imageData.data[idx+1]*gS,imageData.data[idx+2]*bS,palette,useSqr,rW,gW,bW,caW);
						blocks.push([e,a,imageData.data[idx+3],t.name]);
						imageData.data[idx]=t.R;
						imageData.data[idx+1]=t.G;
						imageData.data[idx+2]=t.B;
					}
				}
				currentRow=endRow;
				setProgress(Math.round(currentRow/totalRows*100));

				if(currentRow<totalRows){
					setTimeout(processChunk,0);
				}else{
					convert_preview.getContext("2d").putImageData(imageData,0,0);
					convert_preview.style="display: block;";
					document.getElementById("convertPreviewContainer").style="display: block;";
					status.innerText="转换完成！";
					status.className="status-message success";
					download.style="display: inline-flex;";
					progressContainer.style="display: none;";
					isConverting=false;
					convert.disabled=false;
					convert.style.opacity="1";
					convert.style.cursor="pointer";
				}
			}

			processChunk();
		};

		img_preview.onmousemove=e=>{
			var a=getMousePos(e.target,e),t=img_preview.getContext("2d").getImageData(a[0],a[1],1,1).data;
			e.target.title=`Pos: ${a[0]},${a[1]}  R:${t[0]} G:${t[1]} B:`+t[2]
		};
		convert_preview.onmousemove=e=>{
			var a=getMousePos(e.target,e),t=convert_preview.getContext("2d").getImageData(a[0],a[1],1,1).data;
			e.target.title=`Pos: ${a[0]},${a[1]}  R:${t[0]} G:${t[1]} B:`+t[2]
		};
	</script>
</body>
</html>
